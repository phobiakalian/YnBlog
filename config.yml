# config.yml - Decap CMS Configuration
# Simpan di root repositori, akses via /admin/index.html

backend:
  name: git-gateway
  branch: main

media_folder: "assets/images"
public_folder: "/assets/images"

collections:
  - name: "articles"
    label: "Artikel"
    folder: "_data"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "ID", name: "id", widget: "string", required: false}
      - {label: "Judul", name: "title", widget: "string"}
      - {label: "Ringkasan", name: "excerpt", widget: "text"}
      - {label: "Konten", name: "content", widget: "markdown"}
      - {label: "Penulis", name: "author", widget: "string"}
      - {label: "Avatar Penulis", name: "authorAvatar", widget: "string", required: false}
      - {label: "Kategori", name: "category", widget: "select", options: ["tutorial", "berita", "lifestyle", "opini", "lainnya"]}
      - {label: "Tags", name: "tags", widget: "list", required: false}
      - {label: "Gambar Cover", name: "imageUrl", widget: "image", required: false}
      - {label: "Status", name: "status", widget: "select", options: ["published", "draft"], default: "draft"}
      - {label: "Tanggal Publikasi", name: "publishedAt", widget: "datetime", required: false}