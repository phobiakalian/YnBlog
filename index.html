<!DOCTYPE html>
<html lang="id" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CeritaKu - Baca & Bagikan Cerita Menarik</title>
  <meta name="description" content="Platform membaca dan berbagi cerita, artikel, dan berita terkini."/>
  <meta name="theme-color" content="#0f0f0f"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">

  <!-- Tailwind CSS via CDN for utility classes -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#6366f1',
            'bg-dark': '#0f0f0f',
            'bg-card': '#1a1a1a',
            'bg-input': '#252525',
            'text-main': '#f5f5f5',
            'text-muted': '#a1a1aa',
            'border-dark': '#333333'
          },
          borderRadius: {
            'xl': '16px',
            '2xl': '20px',
            'full': '9999px'
          },
          boxShadow: {
            'card': '0 4px 6px -1px rgba(0, 0, 0, 0.3)',
            'glow': '0 0 20px rgba(99, 102, 241, 0.3)'
          },
          animation: {
            'fade-in': 'fadeIn 0.3s ease-out',
            'slide-up': 'slideUp 0.4s ease-out',
            'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite'
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' }
            },
            slideUp: {
              '0%': { transform: 'translateY(20px)', opacity: '0' },
              '100%': { transform: 'translateY(0)', opacity: '1' }
            }
          }
        }
      }
    }
  </script>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css"/>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">

  <!-- Preconnect for performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>
<body class="bg-bg-dark text-text-main min-h-screen">

  <!-- Skip Link for Accessibility -->
  <a href="#mainContent" class="skip-link">Langsung ke konten</a>

  <!-- Header -->
  <header class="header" role="banner">
    <div class="container header-content">
      <a href="index.html" class="logo" aria-label="CeritaKu - Beranda">
        <div class="logo-icon" aria-hidden="true">C</div>
        <span>CeritaKu</span>
      </a>

      <nav class="nav-actions" role="navigation" aria-label="Navigasi utama">
        <button id="searchBtn" class="icon-btn" title="Cari artikel" aria-label="Cari artikel">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="11" cy="11" r="8"/>
            <path d="m21 21-4.35-4.35"/>
          </svg>
        </button>
      </nav>
    </div>
  </header>

  <!-- Main Content -->
  <main id="mainContent" class="container" role="main">
    <div class="feed-container">

      <!-- Article Feed Section -->
      <section class="feed-section" aria-label="Daftar artikel">

        <!-- Loading State -->
        <div id="loadingFeed" class="loading" role="status" aria-live="polite">
          <div class="spinner" aria-hidden="true"></div>
          <span>Memuat cerita...</span>
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="empty-state hidden" role="status">
          <div class="empty-state-icon" aria-hidden="true">📝</div>
          <h2 class="empty-state-title">Belum ada cerita</h2>
          <p class="empty-state-description">Jadilah yang pertama menulis cerita menarik!</p>
        </div>

        <!-- Articles Container -->
        <div id="articlesContainer" class="articles-grid hidden" role="feed" aria-label="Daftar artikel">
          <!-- Articles will be dynamically inserted here -->
        </div>

      </section>

      <!-- Sidebar -->
      <aside class="sidebar" aria-label="Sidebar">
        
        <!-- Categories -->
        <div class="card mb-4">
          <h3 class="card-title mb-3">Kategori</h3>
          <div class="category-tags" role="group" aria-label="Filter kategori">
            <button class="tag active" data-category="all" aria-pressed="true" role="radio">Semua</button>
            <button class="tag" data-category="tutorial" aria-pressed="false" role="radio">Tutorial</button>
            <button class="tag" data-category="berita" aria-pressed="false" role="radio">Berita</button>
            <button class="tag" data-category="lifestyle" aria-pressed="false" role="radio">Lifestyle</button>
            <button class="tag" data-category="opini" aria-pressed="false" role="radio">Opini</button>
            <button class="tag" data-category="lainnya" aria-pressed="false" role="radio">Lainnya</button>
          </div>
        </div>

        <!-- Trending Articles -->
        <div class="card">
          <h3 class="card-title mb-3">🔥 Trending</h3>
          <div id="trendingList" class="trending-list" role="list" aria-label="Artikel trending">
            <p class="text-text-muted text-sm">Memuat trending...</p>
          </div>
        </div>

      </aside>

    </div>
  </main>

  <!-- Footer -->
  <footer class="footer" role="contentinfo">
    <div class="container">
      <p>&copy; 2024 CeritaKu. Dibuat dengan ❤️ untuk para penulis.</p>
      <p class="text-text-muted text-sm mt-2">
        <a href="#" class="hover:text-primary transition-colors">Tentang</a> •
        <a href="#" class="hover:text-primary transition-colors">Privasi</a> •
        <a href="#" class="hover:text-primary transition-colors">Kontak</a>
      </p>
    </div>
  </footer>

  <!-- Toast Container -->
  <div id="toastContainer" class="toast-container" role="region" aria-live="polite" aria-label="Notifikasi"></div>

  <!-- Application Scripts -->
  <script src="app.js"></script>

</body>
</html>
